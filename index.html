<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Rope Sync</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" sizes="64x64" href="Newer.png">
</head>
    <body>
        <section class="main">
            <div class="logo">
                <img src="Newer.png" alt="logo" width="150px" height="150px">
            </div>
            <h1>Rope Sync</h1>
            <h2 id="count-el">0</h2>
            <button id="increment-btn" onclick="incrementer()">COUNT</button><br><br><br>
            <div class="horizon">
                <button id="reset-btn" onclick="reset()">Reset</button><br>
                <button id="save-btn" onclick="save()">Save</button>
            </div>
            <div>
                <p id="save-el">Previous entires: </p>
                <button id="clear-btn">Clear</button>
            </div>
            <script src="index.js"></script>
        </section>
    </body>
</html>
